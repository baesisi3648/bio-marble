<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문제 관리자 — 생명 마블</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ===== LOCK SCREEN ===== -->
<div id="lock-screen">
  <h1>⚙️ 관리자 페이지</h1>
  <div class="subtitle">생명 마블 문제 관리</div>
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <label>비밀번호</label>
    <input type="password" id="lock-pwd" placeholder="비밀번호 입력" autocomplete="off">
    <button id="btn-unlock">입장</button>
    <div class="lock-error" id="lock-error"></div>
    <div class="lock-back"><a href="index.html">← 게임으로 돌아가기</a></div>
  </div>
</div>

<!-- ===== ADMIN PANEL ===== -->
<div id="admin-panel">
  <div class="admin-header">
    <h1>⚙️ 문제 관리자</h1>
    <div class="header-actions">
      <button class="btn-export" id="btn-export">📥 JSON 내보내기</button>
      <button class="btn-import" id="btn-import">📤 JSON 가져오기</button>
      <button class="btn-reset" id="btn-reset">↺ 기본값으로 초기화</button>
      <a class="btn-game" href="index.html">🎮 게임 화면</a>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <span class="label">등록 문제</span>
      <span class="value" id="stat-count">0</span>
      <span class="label">개 (목표 50개)</span>
    </div>
  </div>

  <div class="add-form">
    <h3>➕ 문제 추가</h3>
    <div class="form-row">
      <div>
        <label>문제</label>
        <textarea id="add-q" placeholder="문제를 입력하세요 (줄바꿈 가능)"></textarea>
      </div>
      <div>
        <label>정답</label>
        <textarea id="add-a" placeholder="정답을 입력하세요"></textarea>
      </div>
      <button class="btn-add" id="btn-add">추가</button>
    </div>
  </div>

  <div class="quiz-list" id="quiz-list"></div>
</div>

<input type="file" id="import-file" accept="application/json,.json">
<div id="toast"></div>

<script data-cfasync="false" src="js/admin.js"></script>
</body>
</html>
